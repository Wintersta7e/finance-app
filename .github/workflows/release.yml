name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        working-directory: packages/backend

      - name: Build backend TypeScript
        run: npm run build:backend

      - name: Prepare production backend dependencies
        shell: bash
        run: |
          cd packages/backend
          rm -rf staging node_modules_prod
          mkdir -p staging
          cp package.json staging/
          cd staging
          npm install --omit=dev
          cd ..
          mv staging/node_modules node_modules_prod
          rm -rf staging

      - name: Build frontend
        run: npm -w @finance/desktop run build

      - name: Build Windows portable and publish to GitHub Releases
        run: npx electron-builder --win portable --publish always
        working-directory: packages/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish release (undraft)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: gh release edit "$TAG_NAME" --draft=false

      - name: Delete old releases (keep latest 3)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release list --json tagName --jq '.[].tagName' | tail -n +4 | while read -r tag; do
            echo "Deleting release $tag"
            gh release delete "$tag" --yes --cleanup-tag
          done
