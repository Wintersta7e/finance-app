name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Lockfile generated on Linux/WSL lacks Windows native bindings.
      - name: Install Windows native bindings
        run: npm install @rolldown/binding-win32-x64-msvc @rollup/rollup-win32-x64-msvc @tailwindcss/oxide-win32-x64-msvc lightningcss-win32-x64-msvc @esbuild/win32-x64 @unrs/resolver-binding-win32-x64-msvc --no-save

      - name: Read Electron version
        id: electron
        shell: bash
        run: echo "version=$(node -e "console.log(require('./node_modules/electron/package.json').version)")" >> "$GITHUB_OUTPUT"

      - name: Generate Prisma Client
        run: npx prisma generate
        working-directory: packages/backend

      - name: Build backend TypeScript
        run: npm run build:backend

      - name: Prepare production backend dependencies
        shell: bash
        run: |
          cd packages/backend
          rm -rf staging node_modules_prod
          mkdir -p staging
          cp package.json staging/
          cd staging
          npm install --omit=dev
          npx @electron/rebuild --version "${{ steps.electron.outputs.version }}" --module-dir . --only better-sqlite3
          cd ..
          mv staging/node_modules node_modules_prod
          rm -rf staging

      - name: Build frontend
        run: npm -w @finance/desktop run build

      - name: Build Windows portable and publish to GitHub Releases
        run: npx electron-builder --win portable --publish always --config.electronVersion=${{ steps.electron.outputs.version }}
        working-directory: packages/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish release (undraft)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: gh release edit "$TAG_NAME" --draft=false

      - name: Delete old releases (keep latest 3)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release list --json tagName --jq '.[].tagName' | tail -n +4 | while read -r tag; do
            echo "Deleting release $tag"
            gh release delete "$tag" --yes --cleanup-tag
          done
